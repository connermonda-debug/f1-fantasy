name: Update F1 Results

on:
  schedule:
    # Run daily at 6 AM UTC (1 AM EST) — after most race weekends wrap up
    - cron: '0 6 * * *'
  # Also run 2 hours after typical race end times (different for different time zones)
  # Races typically end Sunday afternoon in race-local time
  # Additional runs to catch results faster on race weekends
    - cron: '0 18 * * 0' # Sunday 6 PM UTC
    - cron: '0 12 * * 0' # Sunday 12 PM UTC
  workflow_dispatch: {} # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest results
        run: node scripts/fetch-results.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/results.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update race results"
            git push
          fi
