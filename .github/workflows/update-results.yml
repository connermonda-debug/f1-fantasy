name: Update F1 Results

on:
  schedule:
    # Run every 2 hours on Fri/Sat/Sun (race weekend coverage)
    # Covers qualifying (usually Saturday), sprint (Saturday), race (Sunday)
    - cron: '0 */2 * * 5,6,0'
    # Run once daily Mon-Thu to catch any stragglers or corrections
    - cron: '0 8 * * 1,2,3,4'
  workflow_dispatch: {} # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest results
        run: node scripts/fetch-results.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/results.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update race results"
            git push
          fi
